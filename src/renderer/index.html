<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卷轴 Scroll</title>
    <style>
      html, body { margin: 0; height: 100%; background: #f8fafc; }
      #boot {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #64748b;
      }
      #boot .brand { font-size: 22px; font-weight: 600; color: #0f172a; letter-spacing: 0.02em; }
      #boot .hint { font-size: 13px; }
      #boot .dots { display: flex; gap: 6px; margin-top: 4px; }
      #boot .dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #94a3b8;
        animation: boot-bounce 0.9s infinite ease-in-out;
      }
      #boot .dots span:nth-child(2) { animation-delay: 0.15s; }
      #boot .dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes boot-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-5px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="brand">卷轴 Scroll</div>
        <div class="hint">正在启动…</div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
