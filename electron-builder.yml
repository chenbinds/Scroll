appId: com.scroll.ebook-reader
productName: Scroll
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/pdfjs-dist/**/*
win:
  target:
    - target: portable
      arch: [x64]
  artifactName: Scroll.exe
  sign: null
  signDlls: false
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
portable:
  artifactName: Scroll.exe
asar: true
compression: maximum
